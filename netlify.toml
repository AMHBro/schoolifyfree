[build]
  publish = "dist"
  command = "bun install && bun run build"

[build.environment]
  NODE_VERSION = "20"
  BUN_VERSION = "1.2"
  VITE_API_BASE_URL = "https://backend-production-563f.up.railway.app/api"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200 